<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع الطلب | متجر أورا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #05D1CE; 
            --secondary-color: #FF6B01;
            --success-color: #05D1CE;
            --bg-body: #f4f7f6;
            --step-inactive: #d1d8e0;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-body);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%; max-width: 800px; padding: 50px 30px;
            border-radius: 35px; box-shadow: 0 20px 60px rgba(0,0,0,0.06);
            text-align: center; overflow: hidden;
        }

        /* دخول انسيابي للعنوان */
        .aura-header {
            font-size: 2.3rem; font-weight: 900;
            background: linear-gradient(to left, var(--primary-color), var(--success-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
            opacity: 0; transform: translateY(-30px);
            animation: fadeInHeader 1s ease-out forwards;
        }

        @keyframes fadeInHeader {
            to { opacity: 1; transform: translateY(0); }
        }

        /* منطقة البحث */
        .search-area { margin-bottom: 45px; }
        
        input {
            width: 100%; max-width: 420px; padding: 18px; border-radius: 20px;
            border: 2px solid #e2e8f0; font-size: 17px; text-align: center;
            outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary-color); box-shadow: 0 10px 20px rgba(72, 52, 212, 0.1); }

        .btn-track {
            margin-top: 20px; background: var(--primary-color); color: #fff; border: none;
            padding: 15px 40px; border-radius: 18px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.3s; display: inline-flex; gap: 12px; align-items: center;
            justify-content: center;
        }

        .btn-track:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(72, 52, 212, 0.3); }

        /* حركة العدسة العشوائية واللطيفة */
        .search-icon {
            display: inline-block;
            animation: playfulBounce 2.5s infinite cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        @keyframes playfulBounce {
            0% { transform: translate(0, 0) scale(1) rotate(0); }
            20% { transform: translate(-3px, -4px) scale(1.15) rotate(-15deg); }
            40% { transform: translate(4px, -1px) scale(0.9) rotate(15deg); }
            60% { transform: translate(-2px, 3px) scale(1.1) rotate(-5deg); }
            80% { transform: translate(3px, -2px) scale(1) rotate(10deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0); }
        }

        /* منطقة التتبع */
        .tracking-box { display: none; margin-top: 40px; padding-bottom: 20px; }

        .stepper-wrapper { position: relative; z-index: 2; }

        .progress-line-h, .progress-line-v {
            position: absolute; background: #edeff2; border-radius: 10px; z-index: -1;
        }

        /* الخط الأفقي */
        .progress-line-h { top: 41px; left: 12.5%; right: 12.5%; height: 8px; }
        .fill-h {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary-color), var(--success-color));
            border-radius: 10px; transition-timing-function: linear;
        }

        .progress-line-v { display: none; }

        .stepper { display: flex; justify-content: space-between; }
        .step { flex: 1; text-align: center; position: relative; }

        /* الدائرة والأيقونات */
        .icon-circle {
            width: 90px; height: 90px; background: #fff;
            border: 4px solid #edeff2; border-radius: 25px; 
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 15px; font-size: 32px; color: var(--step-inactive);
            transition: 0.4s ease-in-out; position: relative;
        }

        /* إشارة الصح الملاصقة */
        .check-badge {
            position: absolute; top: -10px; right: -10px;
            width: 30px; height: 30px; background: var(--success-color);
            border-radius: 50%; color: white; display: flex;
            align-items: center; justify-content: center; font-size: 15px;
            opacity: 0; transform: scale(0); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid #fff; z-index: 5;
        }

        .step.done .icon-circle { border-color: var(--success-color); color: var(--success-color); background: #f0fffb; }
        .step.done .check-badge { opacity: 1; transform: scale(1); }
        .step.active .icon-circle { border-color: var(--primary-color); color: var(--primary-color); box-shadow: 0 10px 25px rgba(72, 52, 212, 0.15); }

        .label { font-weight: 800; font-size: 15px; color: #2d3436; }
        .time { font-size: 12px; color: #b2bec3; margin-top: 4px; min-height: 16px; font-weight: bold; }

        /* رسالة Aura النهائية */
        .congrats-msg {
            margin-top: 50px; font-size: 1.3rem; font-weight: 900; color: var(--success-color);
            opacity: 0; transform: translateY(20px); transition: 1s ease; display: none;
            padding: 15px; border-radius: 20px; background: #f0fffb; border: 1px dashed var(--success-color);
        }

        /* تخصيص الموبايل */
        @media (max-width: 768px) {
            .progress-line-h { display: none; }
            .stepper { flex-direction: column; gap: 40px; align-items: flex-start; padding-right: 20px; }
            .step { display: flex; flex-direction: row; text-align: right; align-items: center; gap: 20px; width: 100%; }
            .icon-circle { margin: 0; width: 75px; height: 75px; font-size: 26px; }
            .check-badge { right: -6px; top: -6px; width: 26px; height: 26px; font-size: 12px; }
            
            .progress-line-v {
                display: block; top: 37.5px; bottom: 37.5px; right: 53.5px; width: 8px;
            }
            .fill-v {
                width: 100%; height: 0%;
                background: linear-gradient(180deg, var(--primary-color), var(--success-color));
                border-radius: 10px; transition-timing-function: linear;
            }
        }
    /* إلغاء التحديد الأزرق والومضة عند اللمس لكل المتصفحات */
button, 
.btn-track, 
input[type="button"], 
input[type="submit"] {
    outline: none !important;
    box-shadow: none !important; /* لالغاء الظل الأزرق في بعض المتصفحات */
    -webkit-tap-highlight-color: transparent !important;
    -webkit-user-select: none; /* لمنع تحديد النص داخل الزر عند الضغط المطول */
    user-select: none;
}

/* تأثير الضغط للأسفل - تأكد من اسم الكلاس */
.btn-track:active {
    transform: translateY(3px) scale(0.96) !important;
    transition: transform 0.1s ease !important;
}

    </style>
</head>
<body>

<div class="container">
    <h1 class="aura-header">تتبع الطلب</h1>

    <div class="search-area">
        <input type="text" id="orderInput" placeholder="يا ترى شو صار بطلبك؟ اكتب رقم الطلب هون 📦">
        <br>
        <button class="btn-track" onclick="trackOrder()">
            <span>طمني عن طلبي</span>
            <i class="fas fa-search search-icon"></i>
        </button>
        <p id="msg" style="margin-top: 15px; font-size: 15px; color: #b2bec3; font-weight: 600;"></p>
    </div>

    <div class="tracking-box" id="trackBox">
        <div class="stepper-wrapper">
            <div class="progress-line-h"><div class="fill-h" id="fH"></div></div>
            <div class="progress-line-v"><div class="fill-v" id="fV"></div></div>

            <div class="stepper">
                <div class="step" id="s1">
                    <div class="check-badge"><i class="fas fa-check"></i></div>
                    <div class="icon-circle"><i class="fas fa-hand-holding-dollar"></i></div>
                    <div><div class="label">تأكيد الدفع</div><div class="time" id="t1"></div></div>
                </div>
                <div class="step" id="s2">
                    <div class="check-badge"><i class="fas fa-check"></i></div>
                    <div class="icon-circle"><i class="fas fa-print"></i></div>
                    <div><div class="label">جاري الطباعة</div><div class="time" id="t2"></div></div>
                </div>
                <div class="step" id="s3">
                    <div class="check-badge"><i class="fas fa-check"></i></div>
                    <div class="icon-circle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width: 36px; height: 36px;">
                            <path d="M3 13 L12 10 L12 4 L6 4" />
                            <rect x="1" y="14" width="11" height="2" />
                            <rect x="1" y="18" width="11" height="4" rx="1" />
                            <path d="M14 22 L22 22 L22 14 L14 14 Z" />
                            <path d="M14 17 L22 17" />
                            <path d="M18 14 L18 17" />
                        </svg>
                    </div>
                    <div><div class="label">الكبس والتغليف</div><div class="time" id="t3"></div></div>
                </div>
                <div class="step" id="s4">
                    <div class="check-badge"><i class="fas fa-check"></i></div>
                    <div class="icon-circle"><i class="fas fa-truck-fast"></i></div>
                    <div><div class="label">تم الشحن</div><div class="time" id="t4"></div></div>
                </div>
            </div>
        </div>

        <div id="auraCongrats" class="congrats-msg">ألف مبروك 😊 وشكراً لثقتك بـ Aura</div>
    </div>
</div>

<script>
    // التأكد من أن مكتبة تيليجرام جاهزة
const tg = window.Telegram.WebApp;

// 1. إظهار زر الرجوع الرسمي في الأعلى
tg.BackButton.show();

// 2. تحديد ماذا يحدث عند الضغط عليه
tg.BackButton.onClick(function() {
    // العودة للرابط الرئيسي الخاص بك على GitHub
    window.location.href = "https://your-username.github.io/main-page/";
    
    // ملاحظة: يمكنك أيضاً استخدام window.history.back() للعودة للصفحة السابقة
});

// إبلاغ تيليجرام أن التطبيق جاهز للعرض
tg.ready();

    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRAJVTG67wkszBpP_XVK8MGGn2FDVsic53RITJLNOD19uzVE3O327sGor2XqRexfoGt2K7mQBlOZuoM/pub?output=csv';

    async function trackOrder() {
        const id = document.getElementById('orderInput').value.trim();
        const msg = document.getElementById('msg');
        const box = document.getElementById('trackBox');

        if (!id) { msg.innerText = "نسيت تكتب رقم الطلب! 😊"; return; }
        
        // رسالة انتظار لطيفة
        msg.innerText = "ثواني بس.. عم ندور على طلبك 🧐";
        resetUI();

        try {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(','));
            const data = rows.find(r => r[0] && r[0].trim() === id);

            if (data) {
                msg.innerText = "";
                box.style.display = 'block';
                runAnimation(parseInt(data[1]), data[2]);
            } else {
                box.style.display = 'none';
                // رسالة خطأ لطيفة
                msg.innerText = "اممم، ما لقينا هالطلب، متأكد من الرقم؟ 🤔";
            }
        } catch (e) { msg.innerText = "في مشكلة صغيرة بالاتصال، جرب كمان شوي!"; }
    }

    function runAnimation(status, time) {
        const fH = document.getElementById('fH');
        const fV = document.getElementById('fV');
        const targetPercent = ((status - 1) / 3) * 100;
        const durationMs = Math.max((targetPercent / 100) * 3000, 300);

        setTimeout(() => {
            if (fH) { fH.style.transitionDuration = durationMs + 'ms'; fH.style.width = targetPercent + "%"; }
            if (fV) { fV.style.transitionDuration = durationMs + 'ms'; fV.style.height = targetPercent + "%"; }

            for (let i = 1; i <= status; i++) {
                const delay = ((i - 1) / 3) * 3000; 
                
                setTimeout(() => {
                    const step = document.getElementById(`s${i}`);
                    step.classList.add('done');
                    
                    if (i === status && status !== 4) {
                        step.classList.add('active');
                    }
                    if (i === status) { document.getElementById(`t${i}`).innerText = time; }

                    if (status === 4 && i === 4) {
                        setTimeout(() => {
                            const congrats = document.getElementById('auraCongrats');
                            congrats.style.display = 'block';
                            setTimeout(() => { congrats.style.opacity = '1'; congrats.style.transform = 'translateY(0)'; }, 50);
                        }, 500); 
                    }
                }, delay);
            }
        }, 100);
    }

    function resetUI() {
        document.getElementById('fH').style.width = "0%";
        document.getElementById('fV').style.height = "0%";
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active', 'done'));
        document.querySelectorAll('.time').forEach(t => t.innerText = "");
        const c = document.getElementById('auraCongrats');
        c.style.display = 'none'; c.style.opacity = '0'; c.style.transform = 'translateY(20px)';
    }
</script>

</body>
</html>
